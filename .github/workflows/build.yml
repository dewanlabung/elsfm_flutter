name: Build ELSFM Flutter App

on:
  push:
    branches:
      - main
      - claude/flutter-playback-navigation-1fva8r
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    name: Build Android APK

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Build App Bundle
        run: flutter build appbundle --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: elsfm-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: elsfm-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

  create-release:
    runs-on: ubuntu-latest
    needs: [build-android]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    name: Create Release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: elsfm-release-apk

      - name: Download App Bundle
        uses: actions/download-artifact@v4
        with:
          name: elsfm-release-aab

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | cut -d' ' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            app-release.apk
            app-release.aab
          tag_name: v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}

  create-dev-release:
    runs-on: ubuntu-latest
    needs: [build-android]
    if: github.ref == 'refs/heads/claude/flutter-playback-navigation-1fva8r' && github.event_name == 'push'
    name: Create Dev Pre-Release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: elsfm-release-apk

      - name: Delete existing dev-latest tag/release
        run: |
          gh release delete dev-latest --yes || true
          git push origin :refs/tags/dev-latest || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Dev Pre-Release
        uses: softprops/action-gh-release@v1
        with:
          files: app-release.apk
          tag_name: dev-latest
          name: "Dev Build (Latest)"
          body: |
            🚧 **Development build** — auto-generated from branch `claude/flutter-playback-navigation-1fva8r`

            **What's new:**
            - Albums open with real cover art and track list
            - Tracks play when tapped (queues full album/playlist)
            - Artists open with photo, tabs for tracks & albums
            - Play All + Shuffle buttons work
            - Now Playing shows real album art
            - Search results navigate to artist/album/playlist pages

            **Install:** Download `app-release.apk` below, open it on your Android phone.
            > You may need to enable *Install unknown apps* in Android settings.
          draft: false
          prerelease: true
          token: ${{ secrets.GITHUB_TOKEN }}
