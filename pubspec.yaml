name: elsfm
description: ELSFM native music player app
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  riverpod: ^2.0.0
  flutter_riverpod: ^2.0.0

  # HTTP & API
  dio: ^5.0.0
  retrofit: ^4.0.0
  dio_cookie_manager: ^2.0.0
  cookie_jar: ^3.0.0
  path_provider: ^2.0.0

  # Audio
  just_audio: ^0.9.39
  audio_service: ^0.18.16

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.0
  shared_preferences: ^2.2.2

  # Navigation
  go_router: ^14.0.0

  # UI & Utils
  intl: ^0.19.0
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.0
  permission_handler: ^11.4.0
  connectivity_plus: ^5.0.1

  # Logging
  logger: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  build_runner: ^2.0.0
  retrofit_generator: ^7.0.0
  hive_generator: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
